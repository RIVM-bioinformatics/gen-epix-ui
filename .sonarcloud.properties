# Path to sources
# sonar.sources=
# sonar.exclusions=packages/api/**/*,**/test.ts*
sonar.inclusions=packages/ui/src/**/*.ts,packages/ui/src/**/*.tsx

# Path to tests
# sonar.tests=packages
# sonar.test.exclusions=
sonar.test.inclusions=packages/ui/src/**/*.test.ts,packages/ui/src/**/*.test.tsx

# Source encoding
sonar.sourceEncoding=UTF-8

