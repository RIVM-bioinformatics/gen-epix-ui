        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release-please.outputs.api-seqdb-tag-name }} gen-epix-api-seqdb.zip

  publish-api-omopdb:
    needs: release-please
    if: ${{ needs.release-please.outputs.api-omopdb-release-created == 'true' }}
