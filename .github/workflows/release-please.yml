        run: gh release upload ${{ needs.release-please.outputs.ui-seqdb-tag-name }} gen-epix-ui-seqdb.zip

  publish-ui:
    needs: release-please
    if: ${{ needs.release-please.outputs.ui-release-created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-node-env
        with:
