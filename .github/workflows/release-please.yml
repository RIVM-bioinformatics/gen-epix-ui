name: release-please
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      ui-release-created: ${{ steps.release.outputs['packages/ui--release_created'] }}
      ui-tag-name: ${{ steps.release.outputs['packages/ui--tag_name'] }}
      client-theme-release-created: ${{ steps.release.outputs['packages/client-theme--release_created'] }}
      client-theme-tag-name: ${{ steps.release.outputs['packages/client-theme--tag_name'] }}
      api-casedb-release-created: ${{ steps.release.outputs['packages/api-casedb--release_created'] }}
      api-casedb-tag-name: ${{ steps.release.outputs['packages/api-casedb--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4.2.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-ui:
    needs: release-please
    if: ${{ needs.release-please.outputs.ui-release-created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-node-env
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .npmrc
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build
        run: pnpm --filter @gen-epix/ui run build

      - name: Publish to NPM
        run: pnpm --filter @gen-epix/ui publish --access=public --no-git-checks

      - name: Zip dist directory
        run: zip -r gen-epix-ui.zip packages/ui/dist

      - name: Upload release artifact to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release-please.outputs.ui-tag-name }} gen-epix-ui.zip

  publish-client-theme:
    needs: release-please
    if: ${{ needs.release-please.outputs.client-theme-release-created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-node-env
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .npmrc
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to NPM
        run: pnpm --filter @gen-epix/client-theme publish --access=public --no-git-checks

      - name: Zip src directory
        run: zip -r gen-epix-client-theme.zip packages/client-theme/src

      - name: Upload release artifact to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release-please.outputs.client-theme-tag-name }} gen-epix-client-theme.zip

  publish-api-casedb:
    needs: release-please
    if: ${{ needs.release-please.outputs.api-casedb-release-created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-node-env
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .npmrc
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build
        run: pnpm --filter @gen-epix/api-casedb run build

      - name: Publish to NPM
        run: pnpm --filter @gen-epix/api-casedb publish --access=public --no-git-checks

      - name: Zip dist directory
        run: zip -r gen-epix-api-casedb.zip packages/api-casedb/dist

      - name: Upload release artifact to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release-please.outputs.api-casedb-tag-name }} gen-epix-api-casedb.zip
