      - name: Upload release artifact to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release-please.outputs.api-commondb-tag-name }} gen-epix-api-commondb.zip

  publish-api-seqdb:
    needs: release-please
    if: ${{ needs.release-please.outputs.api-seqdb-release-created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-node-env
