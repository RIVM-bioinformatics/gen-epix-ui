name: release-please
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      ui-release-created: ${{ steps.release.outputs['packages/ui--release_created'] }}
      ui-tag-name: ${{ steps.release.outputs['packages/ui--tag_name'] }}
      ui-casedb-release-created: ${{ steps.release.outputs['packages/ui-casedb--release_created'] }}
      ui-casedb-tag-name: ${{ steps.release.outputs['packages/ui-casedb--tag_name'] }}
      ui-omopdb-release-created: ${{ steps.release.outputs['packages/ui-omopdb--release_created'] }}
      ui-omopdb-tag-name: ${{ steps.release.outputs['packages/ui-omopdb--tag_name'] }}
      ui-seqdb-release-created: ${{ steps.release.outputs['packages/ui-seqdb--release_created'] }}
      ui-seqdb-tag-name: ${{ steps.release.outputs['packages/ui-seqdb--tag_name'] }}
      api-casedb-release-created: ${{ steps.release.outputs['packages/api-casedb--release_created'] }}
      api-casedb-tag-name: ${{ steps.release.outputs['packages/api-casedb--tag_name'] }}
      api-commondb-release-created: ${{ steps.release.outputs['packages/api-commondb--release_created'] }}
      api-commondb-tag-name: ${{ steps.release.outputs['packages/api-commondb--tag_name'] }}
      api-seqdb-release-created: ${{ steps.release.outputs['packages/api-seqdb--release_created'] }}
      api-seqdb-tag-name: ${{ steps.release.outputs['packages/api-seqdb--tag_name'] }}
      api-omopdb-release-created: ${{ steps.release.outputs['packages/api-omopdb--release_created'] }}
      api-omopdb-tag-name: ${{ steps.release.outputs['packages/api-omopdb--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4.2.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-ui-casedb:
    needs: release-please
    if: ${{ needs.release-please.outputs.ui-casedb-release-created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-node-env
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .npmrc
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build
        run: pnpm --filter @gen-epix/ui-casedb run build

      - name: Publish to NPM
        run: pnpm --filter @gen-epix/ui-casedb publish --access=public --no-git-checks

      - name: Zip dist directory
        run: zip -r gen-epix-ui-casedb.zip packages/ui-casedb/dist

      - name: Upload release artifact to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release-please.outputs.ui-casedb-tag-name }} gen-epix-ui-casedb.zip

  publish-ui-omopdb:
    needs: release-please
    if: ${{ needs.release-please.outputs.ui-omopdb-release-created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-node-env
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .npmrc
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build
        run: pnpm --filter @gen-epix/ui-omopdb run build

      - name: Publish to NPM
        run: pnpm --filter @gen-epix/ui-omopdb publish --access=public --no-git-checks

      - name: Zip dist directory
        run: zip -r gen-epix-ui-omopdb.zip packages/ui-omopdb/dist

      - name: Upload release artifact to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release-please.outputs.ui-omopdb-tag-name }} gen-epix-ui-omopdb.zip

  publish-ui-seqdb:
    needs: release-please
    if: ${{ needs.release-please.outputs.ui-seqdb-release-created == 'true' }}
    runs-on: ubuntu-latest
